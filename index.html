<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>SLIME.PETS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<link href="https://fonts.cdnfonts.com/css/white-rabbit-2" rel="stylesheet">
<link rel="stylesheet" href="slimegachi/slimegachi.css?v=62">
<style>
  :root {
    --bg-0: #07090c;
    --bg-1: #0d1116;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    background: var(--bg-0);
    overflow: hidden;
    font-family: 'White Rabbit', 'JetBrains Mono', monospace;
  }
  body {
    background-image:
      radial-gradient(ellipse at 50% 40%, rgba(57,255,20,0.06) 0%, transparent 60%),
      linear-gradient(180deg, var(--bg-0) 0%, var(--bg-1) 100%);
    display: flex;
    align-items: center;
    justify-content: center;
  }
  /* Widget is mobile-first; it caps itself at 540×960. The dark SLIME
     gradient above only shows through the letterbox margins on wide screens. */
  #slimegachi {
    width: 100%;
    height: 100%;
    max-width: 540px;
    max-height: 960px;
  }
</style>
</head>
<body>
  <div id="slimegachi"></div>

  <script src="slimegachi/slimegachi.js?v=34"></script>
  <script>
    // v1.5 packaged build. Stub mode out of the box (Kitten + Monkey playable,
    // Owl + Dragon as locked mint-2 teasers). Wallet/storage/theme plug-in
    // points documented in slimegachi-pkg/README.md.

    // Demo reset: load with ?reset=1 to wipe saved progress and start from a
    // clean Level-0 slate on any device (state normally persists in the
    // browser's localStorage). Runs before mount() reads state, then strips the
    // param so a later refresh doesn't keep resetting.
    (function () {
      var params = new URLSearchParams(location.search);
      if (params.has('reset')) {
        try {
          Object.keys(localStorage)
            .filter(function (k) { return k.indexOf('slimegachi') === 0; })
            .forEach(function (k) { localStorage.removeItem(k); });
        } catch (e) {}
        params.delete('reset');
        var qs = params.toString();
        history.replaceState(null, '', location.pathname + (qs ? '?' + qs : '') + location.hash);
      }
    })();

    const game = SLIMEgachi.mount(document.getElementById('slimegachi'), {
      theme: { accent: '#4ade80' }  // SLIME HUD green
    });
  </script>
</body>
</html>
